worker_processes 1;
user www-data;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout    300s;
    proxy_connect_timeout  75s;
    proxy_buffering off;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name apigenie.roarinpenguin.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name apigenie.roarinpenguin.com;

        ssl_certificate     /etc/letsencrypt/live/apigenie.roarinpenguin.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/apigenie.roarinpenguin.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1h;

        client_max_body_size 4G;

        # ── Static landing page (exact matches — highest nginx priority) ────────
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
            add_header Cache-Control "no-store";
        }

        location = /logo.png {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /favicon.ico {
            root /usr/share/nginx/html;
            try_files /logo.png =404;
        }

        # ── Everything else → FastAPI ──────────────────────────────────────────
        # FastAPI handles all API routing, the admin UI, and returns proper
        # JSON 404s for unknown paths. This avoids nginx silently swallowing
        # paths the collector calls that we haven't explicitly listed.
        location / {
            proxy_pass http://apigenie:8000;
        }
    }

    # ── Pub/Sub emulator behind TLS ────────────────────────────────────────────
    # Production GCP client libraries default to gRPC-over-TLS and will refuse
    # to negotiate plaintext h2c against the raw emulator port (8085). nginx
    # terminates TLS here on 8443 (using the same Let's Encrypt cert) and
    # forwards plaintext gRPC to the emulator container.
    #
    # Collectors that DO honour PUBSUB_EMULATOR_HOST should still use 8085
    # directly (no TLS, lower overhead). Collectors that don't, point at 8443.
    server {
        listen 8443 ssl;
        listen [::]:8443 ssl;
        http2 on;
        server_name apigenie.roarinpenguin.com;

        ssl_certificate     /etc/letsencrypt/live/apigenie.roarinpenguin.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/apigenie.roarinpenguin.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # gRPC needs unbounded message size and long-lived connections.
        grpc_read_timeout    1h;
        grpc_send_timeout    1h;
        client_max_body_size 0;

        location / {
            grpc_pass grpc://pubsub-emulator:8085;
            error_page 502 = /grpc_unavailable;
        }

        location = /grpc_unavailable {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header grpc-message "pubsub-emulator unavailable";
            return 204;
        }
    }
}
