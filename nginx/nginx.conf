worker_processes 1;
user www-data;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout    300s;
    proxy_connect_timeout  75s;
    proxy_buffering off;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name apigenie.roarinpenguin.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name apigenie.roarinpenguin.com;

        ssl_certificate     /etc/letsencrypt/live/apigenie.roarinpenguin.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/apigenie.roarinpenguin.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1h;

        client_max_body_size 4G;

        # ── Landing page ───────────────────────────────────────────────────────
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
            add_header Cache-Control "no-store";
        }

        location = /logo.png {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /favicon.ico {
            root /usr/share/nginx/html;
            try_files /logo.png =404;
        }

        # ── ApiGenie → FastAPI ─────────────────────────────────────────────────
        location = /health {
            proxy_pass http://apigenie:8000;
        }

        # Okta
        location = /api/v1/logs {
            proxy_pass http://apigenie:8000;
        }

        # Netskope
        location /api/v2/ {
            proxy_pass http://apigenie:8000;
        }

        # Microsoft Entra ID
        location /v1.0/auditLogs/ {
            proxy_pass http://apigenie:8000;
        }

        # Microsoft Defender
        location /v1.0/subscriptions/ {
            proxy_pass http://apigenie:8000;
        }
        location /subscriptions/ {
            proxy_pass http://apigenie:8000;
        }

        # Cisco Duo
        location /admin/ {
            proxy_pass http://apigenie:8000;
        }

        # GCP Cloud Logging
        location /v2/entries {
            proxy_pass http://apigenie:8000;
        }

        # Tenable
        location /vulns/ {
            proxy_pass http://apigenie:8000;
        }
        location /assets/ {
            proxy_pass http://apigenie:8000;
        }
        location /audit-log/ {
            proxy_pass http://apigenie:8000;
        }

        # Proofpoint TAP
        location /v2/siem/ {
            proxy_pass http://apigenie:8000;
        }

        # AWS CloudTrail
        location /v1/cloudtrail/ {
            proxy_pass http://apigenie:8000;
        }

        # AWS WAF
        location /v1/waf/ {
            proxy_pass http://apigenie:8000;
        }

        # AWS GuardDuty
        location /v1/guardduty/ {
            proxy_pass http://apigenie:8000;
        }
        location /detector/ {
            proxy_pass http://apigenie:8000;
        }

        # Wiz
        location = /graphql {
            proxy_pass http://apigenie:8000;
        }

        # Snyk
        location /v1/org/ {
            proxy_pass http://apigenie:8000;
        }
        location /rest/orgs/ {
            proxy_pass http://apigenie:8000;
        }

        # Darktrace
        location = /modelbreaches {
            proxy_pass http://apigenie:8000;
        }
        location /aianalyst/ {
            proxy_pass http://apigenie:8000;
        }
        location = /status {
            proxy_pass http://apigenie:8000;
        }

        # OAuth2
        location /oauth2/ {
            proxy_pass http://apigenie:8000;
        }
        location = /v2.0/token {
            proxy_pass http://apigenie:8000;
        }

        # Catch-all
        location / {
            return 404;
        }
    }
}
