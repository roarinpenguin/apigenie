version: "3.9"

# ApiGenie — fully self-contained stack.
# Starts: nginx (SSL), FastAPI mock server, Kafka + Zookeeper, GCP Pub/Sub emulator.
#
# Firewall:
#   80, 443                    HTTP redirect + main HTTPS API
#   8443                       Pub/Sub gRPC over TLS (emulator behind nginx)
#   8085                       Pub/Sub gRPC plaintext (only for emulator-aware clients)
#   9092                       Kafka PLAINTEXT (legacy)
#   9093                       Kafka SASL_SSL (Azure Event Hubs emulation)
#   9094                       Kafka SASL_PLAINTEXT (lab override, no TLS)
#
# Deploy:
#   docker compose up -d --build

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────
  # nginx.conf is generated at start by entrypoint.sh which runs envsubst on
  # nginx.conf.template using APIGENIE_DOMAIN. Certs are mounted from
  # ./certs/<domain>/ which bootstrap.sh populates regardless of TLS mode
  # (self-signed | letsencrypt | provided).
  nginx:
    image: nginx:latest
    container_name: apigenie-nginx
    restart: unless-stopped
    environment:
      APIGENIE_DOMAIN: ${APIGENIE_DOMAIN:-apigenie.example.com}
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint.d/00-apigenie-render.sh:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - apigenie
    networks:
      - apigenie-net

  # ── FastAPI mock server ────────────────────────────────────────────────────
  apigenie:
    build: .
    container_name: apigenie
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./data:/var/lib/apigenie
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_PASSWORD_FILE: /var/lib/apigenie/admin_pass
      APIGENIE_TLS_MODE: ${APIGENIE_TLS_MODE:-self-signed}
      APIGENIE_TLS_EMAIL: ${APIGENIE_TLS_EMAIL:-}
      APIGENIE_KAFKA_ADVERTISED_HOST: ${APIGENIE_KAFKA_ADVERTISED_HOST:-${APIGENIE_DOMAIN:-apigenie.example.com}}
      APIGENIE_CERT_DIR: /certs/${APIGENIE_DOMAIN:-apigenie.example.com}
      PUBLISHERS_ENABLED: ${PUBLISHERS_ENABLED:-true}
      APIGENIE_DOMAIN: ${APIGENIE_DOMAIN:-apigenie.example.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-apigenie}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      # Admin GeoMap / Sankey
      APIGENIE_AGG_CAP: ${APIGENIE_AGG_CAP:-5000}
      # Pub/Sub emulator
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: obs-test
      PUBSUB_TOPIC_ID: audit-logs
      PUBSUB_SUBSCRIPTION_ID: audit-logs-sub
      PUBSUB_PUBLISH_INTERVAL: "10"
      PUBSUB_BATCH_SIZE: "5"
      # Kafka — internal Docker listener
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: azure-platform-logs
      KAFKA_PUBLISH_INTERVAL: "10"
      KAFKA_BATCH_SIZE: "5"
    depends_on:
      kafka:
        condition: service_healthy
      pubsub-emulator-seed:
        condition: service_completed_successfully
    networks:
      - apigenie-net

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.6
    container_name: apigenie-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - apigenie-net

  # ── Kafka cert init (one-shot) ─────────────────────────────────────────────
  # Reads the unified ./certs/<domain>/ tree (populated by bootstrap.sh from
  # whichever TLS mode was chosen) and writes a combined PEM into the
  # kafka-certs volume so cp-kafka can serve SASL_SSL on 9093 with the same
  # certificate as nginx.
  kafka-cert-init:
    image: alpine:3.19
    container_name: apigenie-kafka-cert-init
    environment:
      APIGENIE_DOMAIN: ${APIGENIE_DOMAIN:-apigenie.example.com}
    volumes:
      - ./certs:/certs:ro
      - kafka-certs:/secrets
    command:
      - sh
      - -c
      - |
        set -eu
        SRC="/certs/$$APIGENIE_DOMAIN"
        if [ ! -f "$$SRC/privkey.pem" ] || [ ! -f "$$SRC/fullchain.pem" ]; then
          echo "kafka-cert-init: $$SRC missing privkey.pem or fullchain.pem; SASL_SSL on 9093 will fail TLS"
          # Write a self-signed fallback so the broker still boots and the
          # rest of the stack remains usable.
          apk add --no-cache openssl >/dev/null
          openssl req -x509 -newkey rsa:2048 -nodes -days 30 \
            -keyout /tmp/k.pem -out /tmp/c.pem \
            -subj "/CN=$$APIGENIE_DOMAIN" \
            -addext "subjectAltName=DNS:$$APIGENIE_DOMAIN,DNS:localhost"
          cat /tmp/k.pem /tmp/c.pem > /secrets/kafka-combined.pem
        else
          cat "$$SRC/privkey.pem" "$$SRC/fullchain.pem" > /secrets/kafka-combined.pem
        fi
        chmod 644 /secrets/kafka-combined.pem
        echo "dummy" > /secrets/kafka_keystore_creds
        chmod 644 /secrets/kafka_keystore_creds
        echo "kafka-cert-init: wrote /secrets/kafka-combined.pem ($$(wc -c < /secrets/kafka-combined.pem) bytes) for $$APIGENIE_DOMAIN"
    networks:
      - apigenie-net

  # ── Kafka ──────────────────────────────────────────────────────────────────
  # Listener layout:
  #   9092 PLAINTEXT  — legacy plain Kafka clients (kept for backward compat)
  #   9093 SASL_SSL   — Azure Event Hubs emulation (real Azure shape)
  #   9094 SASL_PLAINTEXT — Azure Event Hubs emulation, no TLS (lab override)
  #   29092 PLAINTEXT — in-Docker internal listener (apigenie publisher)
  #
  # SASL/PLAIN credentials accepted on 9093 and 9094:
  #   admin               / apigenie-eh-admin-2026     (broker admin)
  #   $$ConnectionString  / Endpoint=sb://${APIGENIE_DOMAIN}/;SharedAccessKeyName=mock;SharedAccessKey=apigenie-eh-mock-2026;EntityPath=azure-platform-logs
  kafka:
    image: confluentinc/cp-kafka:7.6.6
    container_name: apigenie-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
      kafka-cert-init:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    volumes:
      - kafka-certs:/etc/kafka/secrets:ro
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: >-
        EXTERNAL://0.0.0.0:9092,SASLSSL://0.0.0.0:9093,SASLPLAIN://0.0.0.0:9094,DOCKER://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: >-
        EXTERNAL://${APIGENIE_KAFKA_ADVERTISED_HOST:-apigenie.example.com}:9092,SASLSSL://${APIGENIE_KAFKA_ADVERTISED_HOST:-apigenie.example.com}:9093,SASLPLAIN://${APIGENIE_KAFKA_ADVERTISED_HOST:-apigenie.example.com}:9094,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        EXTERNAL:PLAINTEXT,SASLSSL:SASL_SSL,SASLPLAIN:SASL_PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      # SASL/PLAIN on the two SASL listeners
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASLSSL_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASLPLAIN_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASLSSL_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="apigenie-eh-admin-2026" user_admin="apigenie-eh-admin-2026" user_$$ConnectionString="Endpoint=sb://${APIGENIE_KAFKA_ADVERTISED_HOST:-apigenie.example.com}/;SharedAccessKeyName=mock;SharedAccessKey=apigenie-eh-mock-2026;EntityPath=azure-platform-logs";
      KAFKA_LISTENER_NAME_SASLPLAIN_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="apigenie-eh-admin-2026" user_admin="apigenie-eh-admin-2026" user_$$ConnectionString="Endpoint=sb://${APIGENIE_KAFKA_ADVERTISED_HOST:-apigenie.example.com}/;SharedAccessKeyName=mock;SharedAccessKey=apigenie-eh-mock-2026;EntityPath=azure-platform-logs";
      # TLS — combined PEM produced by kafka-cert-init from Let's Encrypt.
      # cp-kafka image uses *_FILENAME (relative to /etc/kafka/secrets) and a
      # *_CREDENTIALS file (required by preflight even though Kafka ignores
      # the password for PEM keystores).
      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_KEYSTORE_FILENAME: kafka-combined.pem
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      # Cluster basics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    # The cp-kafka image's preflight requires KAFKA_SSL_KEYSTORE_CREDENTIALS
    # and writes ssl.keystore.password / ssl.key.password into the broker
    # config. Kafka then rejects those properties because we use PEM keystore
    # type. Override the entrypoint to run configure, strip those two lines,
    # then launch normally.
    entrypoint:
      - sh
      - -c
      - |
        /etc/confluent/docker/configure
        sed -i -E '/^ssl\.(keystore|key)\.password=/d' /etc/kafka/kafka.properties
        exec /etc/confluent/docker/launch
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - apigenie-net

  # ── GCP Pub/Sub emulator ───────────────────────────────────────────────────
  # External clients connect on host:8085 (gRPC).
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: apigenie-pubsub
    restart: unless-stopped
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=obs-test
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8085 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - apigenie-net

  # ── Pub/Sub seed (creates topic + subscription, then exits) ───────────────
  pubsub-emulator-seed:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: apigenie-pubsub-seed
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      EMULATOR: "http://pubsub-emulator:8085"
      PROJECT: "obs-test"
      TOPIC: "audit-logs"
      SUBSCRIPTION: "audit-logs-sub"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        put_ok() {
          label=$$1; url=$$2; data=$${3:-}
          if [ -n "$$data" ]; then
            code=$$(curl -sS -o /tmp/body -w "%{http_code}" -X PUT "$$url" \
              -H 'Content-Type: application/json' -d "$$data")
          else
            code=$$(curl -sS -o /tmp/body -w "%{http_code}" -X PUT "$$url")
          fi
          case "$$code" in
            200) echo "$$label: created" ;;
            409) echo "$$label: already exists (ok)" ;;
            *)   echo "$$label: FAILED ($$code)"; cat /tmp/body; echo; exit 1 ;;
          esac
        }
        put_ok "topic" \
          "$$EMULATOR/v1/projects/$$PROJECT/topics/$$TOPIC"
        put_ok "subscription" \
          "$$EMULATOR/v1/projects/$$PROJECT/subscriptions/$$SUBSCRIPTION" \
          "{\"topic\":\"projects/$$PROJECT/topics/$$TOPIC\",\"ackDeadlineSeconds\":30}"
        echo "Pub/Sub seed complete."
    networks:
      - apigenie-net

  # ── certbot manager (active only when COMPOSE_PROFILES=letsencrypt) ────────
  # Long-running container that:
  #   1. On first start: issues a Let's Encrypt cert if /etc/letsencrypt/live/
  #      doesn't already have one for the domain (HTTP-01 via nginx :80).
  #   2. Every 12 h: runs `certbot renew --keep-until-expiring`. Certbot itself
  #      no-ops unless the cert is within 30 days of expiry, so this is cheap.
  #   3. On every renewal (or first issuance): flattens certbot's archive layout
  #      into ./certs/<domain>/ (the path nginx + kafka-cert-init read from),
  #      then SIGHUPs nginx for a zero-downtime reload and restarts the kafka
  #      cert-init + kafka container so Kafka serves the new SASL_SSL cert.
  #
  # bootstrap.sh writes COMPOSE_PROFILES=letsencrypt into .env when you pick
  # letsencrypt mode, so plain `docker compose up -d` includes this service.
  # For self-signed / provided modes it's not started.
  certbot:
    image: certbot/certbot:latest
    container_name: apigenie-certbot
    profiles: ["letsencrypt"]
    restart: unless-stopped
    environment:
      APIGENIE_DOMAIN: ${APIGENIE_DOMAIN:-apigenie.example.com}
      APIGENIE_TLS_EMAIL: ${APIGENIE_TLS_EMAIL:-admin@example.com}
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      # Mounted so the post-renewal hook can reload nginx and restart kafka
      # without pulling in a separate Docker-CLI image.
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        DOMAIN="$$APIGENIE_DOMAIN"
        TARGET="/etc/letsencrypt/$$DOMAIN"
        LIVE="/etc/letsencrypt/live/$$DOMAIN"

        # Tiny Docker API client — certbot/certbot is Python-based so we use
        # http.client with a UNIX socket connection. No extra deps, no docker
        # CLI install, no shell-quoting madness.
        docker_api() {
          # $$1 = path (e.g. /containers/apigenie-nginx/kill?signal=HUP)
          python3 -c "
        import http.client, socket, sys
        class UDS(http.client.HTTPConnection):
            def connect(self):
                s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                s.connect('/var/run/docker.sock')
                self.sock = s
        c = UDS('localhost'); c.request('POST', sys.argv[1])
        r = c.getresponse()
        print(f'[certbot] docker API {sys.argv[1]} -> {r.status}')
        " "$$1" || true
        }

        flatten_and_reload() {
          mkdir -p "$$TARGET"
          if [ -f "$$LIVE/fullchain.pem" ] && [ -f "$$LIVE/privkey.pem" ]; then
            cp -L "$$LIVE/fullchain.pem" "$$TARGET/fullchain.pem"
            cp -L "$$LIVE/privkey.pem"   "$$TARGET/privkey.pem"
            chmod 644 "$$TARGET/fullchain.pem"
            chmod 600 "$$TARGET/privkey.pem"
            echo "[certbot] flattened certs into $$TARGET/"
            # nginx graceful reload (zero-downtime). The kafka path needs a
            # full container restart since the SASL_SSL listener reads the
            # keystore once at startup. Renewals are rare (~60–90 d) so the
            # ~10 s blip is acceptable.
            echo "[certbot] reloading nginx + restarting kafka stack"
            docker_api "/containers/apigenie-nginx/kill?signal=HUP"
            docker_api "/containers/apigenie-kafka-cert-init/restart"
            docker_api "/containers/apigenie-kafka/restart"
          else
            echo "[certbot] no live cert at $$LIVE yet"
          fi
        }

        issue_or_renew() {
          if [ -d "$$LIVE" ]; then
            echo "[certbot] running certbot renew (no-op unless within 30 d of expiry)"
            certbot renew --webroot --webroot-path=/var/www/certbot \
              --keep-until-expiring --deploy-hook "echo deployed" || true
          else
            echo "[certbot] no existing cert — issuing one for $$DOMAIN"
            certbot certonly \
              --webroot --webroot-path=/var/www/certbot \
              --email "$$APIGENIE_TLS_EMAIL" --agree-tos --no-eff-email \
              --keep-until-expiring \
              -d "$$DOMAIN" || { echo "[certbot] issuance failed; will retry next cycle"; return; }
          fi
          flatten_and_reload
        }

        # Wait briefly for nginx to come up so HTTP-01 succeeds on first boot.
        sleep 10
        while :; do
          issue_or_renew
          # 12 h between attempts. Recommended by EFF / Let's Encrypt.
          sleep 43200
        done

networks:
  apigenie-net:
    driver: bridge

volumes:
  kafka-certs:
