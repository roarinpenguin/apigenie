version: "3.9"

# ApiGenie: nginx (SSL) + FastAPI mock server.
#
# Kafka and Pub/Sub are owned by the test-genius stack.
# When test-genius is running, apigenie joins its network so the background
# publishers can reach kafka:19092 and pubsub-emulator:8085.
# Kafka (9092) and Pub/Sub (8085) are already exposed to the host by
# test-genius — open those ports in your cloud firewall to let collectors in.
#
# Deploy:
#   docker stop test-genius-nginx-1   # free ports 80/443
#   docker compose up -d --build

services:

  nginx:
    image: nginx:latest
    container_name: apigenie-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - apigenie
    networks:
      - apigenie-net

  apigenie:
    build: .
    container_name: apigenie
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      PUBLISHERS_ENABLED: "true"
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: obs-test
      PUBSUB_TOPIC_ID: audit-logs
      PUBSUB_SUBSCRIPTION_ID: audit-logs-sub
      PUBSUB_PUBLISH_INTERVAL: "10"
      PUBSUB_BATCH_SIZE: "5"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: azure-platform-logs
      KAFKA_PUBLISH_INTERVAL: "10"
      KAFKA_BATCH_SIZE: "5"
    networks:
      - apigenie-net
      - test-genius-backend

networks:
  apigenie-net:
    driver: bridge

  test-genius-backend:
    name: test-genius_backend
    driver: bridge
