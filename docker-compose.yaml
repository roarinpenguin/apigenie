version: "3.9"

# ApiGenie is fully self-contained: nginx (SSL + HTML), FastAPI, and
# background publishers all start here.
#
# Kafka and Pub/Sub emulator are shared with the test-genius stack —
# apigenie joins test-genius_backend to reach them by service name.
#
# When test-genius is also running:
#   - Stop its nginx first to free ports 80/443:
#       docker stop test-genius-nginx-1
#   - Then: docker compose up -d
#
# When running standalone (test-genius down):
#   - docker compose up -d   (nginx starts here, owns ports 80/443)

services:

  # ── Reverse proxy + SSL termination ────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: apigenie-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx config from this repo
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certs from the host (renewed by certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Landing page HTML served at /
      - /var/www/html:/usr/share/nginx/html:ro
    depends_on:
      - apigenie
    networks:
      - apigenie-net
      - test-genius-backend

  # ── FastAPI mock server ─────────────────────────────────────────────────────
  apigenie:
    build: .
    container_name: apigenie
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      PUBLISHERS_ENABLED: "true"
      # Pub/Sub emulator — test-genius_backend network
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: obs-test
      PUBSUB_TOPIC_ID: audit-logs
      PUBSUB_SUBSCRIPTION_ID: audit-logs-sub
      PUBSUB_PUBLISH_INTERVAL: "10"
      PUBSUB_BATCH_SIZE: "5"
      # Kafka — test-genius_backend network (internal listener)
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: azure-platform-logs
      KAFKA_PUBLISH_INTERVAL: "10"
      KAFKA_BATCH_SIZE: "5"
    networks:
      - apigenie-net
      - test-genius-backend

networks:
  # Internal network between nginx and the FastAPI container
  apigenie-net:
    driver: bridge

  # Shared network with test-genius (Kafka, Pub/Sub emulator).
  # Declared without external: true so Docker Compose creates it when
  # test-genius is down, and adopts the existing network when it's up.
  test-genius-backend:
    name: test-genius_backend
    driver: bridge
