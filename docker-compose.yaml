version: "3.9"

# ApiGenie runs as a single FastAPI container that joins the existing
# test-genius_backend Docker network. nginx, Kafka, Zookeeper, and the
# Pub/Sub emulator are all already running from the test-genius stack
# and are reachable by service name on that network.
#
# Deploy order:
#   1. Start test-genius stack (provides nginx, kafka, pubsub-emulator)
#   2. docker compose up -d   (starts the apigenie container)
#   3. Copy nginx/nginx.conf to test-genius/nginx/nginx.conf and reload nginx

services:
  apigenie:
    build: .
    container_name: apigenie
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      PUBLISHERS_ENABLED: "true"
      # Pub/Sub emulator already running in test-genius stack
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: obs-test
      PUBSUB_TOPIC_ID: audit-logs
      PUBSUB_SUBSCRIPTION_ID: audit-logs-sub
      PUBSUB_PUBLISH_INTERVAL: "10"
      PUBSUB_BATCH_SIZE: "5"
      # Kafka already running in test-genius stack (internal listener)
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: azure-platform-logs
      KAFKA_PUBLISH_INTERVAL: "10"
      KAFKA_BATCH_SIZE: "5"
    networks:
      - test-genius-backend
    # Port 8000 is intentionally NOT exposed to the host.
    # All external traffic comes through the test-genius nginx on 443.

networks:
  test-genius-backend:
    external: true
    name: test-genius_backend
